<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Adventure Log</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<!--<button id="simulateBtn">Simulate Activity</button>-->
<h1>Adventure Log</h1>
<button id="settingsBtn" class="cog">⚙️</button>
<div id="configPanel">

  <div class="toolbar">
    <input id="rsn" placeholder="RSN">
    <button id="refreshBtn">Refresh</button>
    <button class="active" id="toggleAuto">Auto: ON</button>
  </div>

  <div class="filters">
    <button class="toggle" data-cat="boss">Boss</button>
    <button class="toggle" data-cat="skill">Skill</button>
    <button class="toggle" data-cat="quest">Quest</button>
    <button class="toggle" data-cat="loot">Loot</button>
    <button class="toggle" data-cat="other">Other</button>
  </div>

</div>

<div id="status"></div>

<div id="activities"></div>

<script src="app.js"></script>

</body>
</html>
