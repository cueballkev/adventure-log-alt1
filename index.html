<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Adventure Log</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Adventure Log</h1>

<div class="toolbar">
  <input id="rsn" value="fe cue">
  <button id="refreshBtn">Refresh</button>
</div>

<div class="filters" id="filterBar">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="boss">Boss</button>
  <button class="filter-btn" data-filter="skill">Skill</button>
  <button class="filter-btn" data-filter="quest">Quest</button>
  <button class="filter-btn" data-filter="loot">Loot</button>
  
  <button class="active" id="toggleAuto">Auto: ON</button>
</div>

<div id="status"></div>

<div id="activities"></div>

<script src="app.js"></script>

</body>
</html>
